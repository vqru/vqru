<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }
body { font-family: 'DM Mono', monospace; background: #000; color: #fff; overflow-x: hidden; }

section { scroll-snap-align: start; height: 100vh; }

#hero {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; overflow: hidden;
}

.hero-bg {
  position: absolute; inset: 0;
  background-image: url('https://github.com/vqru/bahh-gifs/blob/main/sample_cc12fe80bd41e5e2e517bd8e940deedb.jpg?raw=true');
  background-size: cover; background-position: center;
  filter: brightness(0.52);
}

.hero-overlay {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.45) 0%, transparent 70%),
    radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.2) 0%, transparent 60%);
}

.hero-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center;
}

.avatar {
  width: 110px; height: 110px; border-radius: 50%;
  border: 2.5px solid rgba(0,220,230,0.7);
  background: #111; overflow: hidden;
  margin-bottom: 14px;
  box-shadow: 0 0 32px rgba(0,200,220,0.25);
  opacity: 0;
  animation: fadeUp 0.9s ease forwards 0.15s;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.hero-name {
  font-family: 'Instrument Serif', serif;
  font-size: 48px; font-weight: 400;
  letter-spacing: -1px; color: #f0f8ff;
  margin-bottom: 4px; line-height: 1;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  opacity: 0;
  animation: fadeUp 0.9s ease forwards 0.55s;
}

.hero-handle {
  font-size: 12px; color: rgba(0,220,230,0.7);
  letter-spacing: 0.06em; margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 0.9s ease forwards 0.75s;
}

.hero-bio {
  font-size: 13px; color: rgba(230,245,255,0.92);
  background: transparent;
  border: 1px solid rgba(0,220,230,0.45);
  border-radius: 14px; padding: 14px 28px;
  width: 340px; line-height: 1.85;
  opacity: 0;
  animation: fadeUp 0.9s ease forwards 0.95s;
}
.hero-bio b { color: #00dce6; font-weight: 500; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.arrow {
  position: absolute; left: 50%; transform: translateX(-50%);
  z-index: 1; cursor: pointer; text-decoration: none;
  display: flex; align-items: center; justify-content: center;
  animation: pulse-dim 2.5s ease-in-out infinite;
}
.arrow-down { bottom: 28px; }
.arrow-up   { top: 28px; }
.arrow svg  { width: 22px; height: 13px; overflow: visible; }

@keyframes pulse-dim {
  0%, 100% { opacity: 0.75; }
  50%       { opacity: 0.12; }
}

#links {
  background: #080808;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 24px; position: relative;
}

.section-label {
  font-size: 11px; letter-spacing: 0.18em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase; margin-bottom: 14px;
  width: 100%; max-width: 360px;
}

.link-list {
  width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 10px;
  margin-bottom: 44px;
}

.link-item {
  display: flex; align-items: center;
  justify-content: space-between;
  background: #111;
  border: 0.5px solid rgba(0,180,190,0.25);
  border-radius: 10px; padding: 14px 18px;
  cursor: pointer; text-decoration: none;
  color: rgba(255,255,255,0.85); font-size: 14px;
  font-family: 'DM Mono', monospace;
  transition: background 0.2s, border-color 0.2s, transform 0.2s, color 0.2s;
}

.link-item:hover {
  background: #0a1f1f;
  border-color: rgba(0,220,230,0.35);
  color: #00dce6; transform: translateX(4px);
}
.link-item:hover .link-icon { color: #00dce6; }
.link-item:hover .link-arrow { color: #00dce6; }

.link-left { display: flex; align-items: center; gap: 12px; }
.link-icon { font-size: 14px; color: rgba(255,255,255,0.35); width: 18px; text-align: center; transition: color 0.2s; }
.link-arrow { color: rgba(255,255,255,0.2); font-size: 14px; transition: color 0.2s; }
</style>
</head>
