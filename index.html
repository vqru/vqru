<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>vqru</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #0a0a0a;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #stage > div {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  #stage canvas {
    display: none;
  }
  #stage pre {
    margin: 0;
    user-select: none;
    padding: 0;
    line-height: 1em;
    white-space: pre;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: #dfe9ec;
    z-index: 9;
  }
  .bio-btn {
    position: absolute;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 20px;
    letter-spacing: 2px;
    color: #eee;
    background: transparent;
    border: 2px solid #666;
    border-radius: 999px;
    padding: 14px 40px;
    cursor: pointer;
    z-index: 20;
  }
  .bio-btn:hover {
    border-color: #ccc;
    color: #fff;
  }
</style>
</head>
<body>
<div id="stage"></div>
<button class="bio-btn">Bio</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TEXT = "vqru";

// ---------- Vertex/Fragment shaders (wave distortion + chromatic shimmer) ----------
const vertexShader = `
varying vec2 vUv;
uniform float uTime;
uniform float uEnableWaves;
void main() {
    vUv = uv;
    float time = uTime * 5.0;
    float waveFactor = uEnableWaves;
    vec3 transformed = position;
    transformed.x += sin(time + position.y) * 0.5 * waveFactor;
    transformed.y += cos(time + position.z) * 0.15 * waveFactor;
    transformed.z += sin(time + position.x) * waveFactor;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
}
`;

const fragmentShader = `
varying vec2 vUv;
uniform float uTime;
uniform sampler2D uTexture;
void main() {
    float time = uTime;
    vec2 pos = vUv;
    float r = texture2D(uTexture, pos + cos(time * 2.0 - time + pos.x) * 0.01).r;
    float g = texture2D(uTexture, pos + tan(time * 0.5 + pos.x - time) * 0.01).g;
    float b = texture2D(uTexture, pos - cos(time * 2.0 + time + pos.y) * 0.01).b;
    float a = texture2D(uTexture, pos).a;
    gl_FragColor = vec4(r, g, b, a);
}
`;

// ---------- Text-to-canvas texture generator ----------
class TextCanvas {
  constructor(text, { fontSize = 200, fontFamily = "Arial", color = "#fdf9f3" } = {}) {
    this.canvas = document.createElement('canvas');
    this.context = this.canvas.getContext('2d');
    this.txt = text;
    this.fontSize = fontSize;
    this.fontFamily = fontFamily;
    this.color = color;
    this.font = `900 ${this.fontSize}px ${this.fontFamily}`;
  }
  resize() {
    this.context.font = this.font;
    const m = this.context.measureText(this.txt);
    this.canvas.width = Math.ceil(m.width) + 20;
    this.canvas.height = Math.ceil(m.actualBoundingBoxAscent + m.actualBoundingBoxDescent) + 20;
  }
  render() {
    const ctx = this.context;
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    ctx.fillStyle = this.color;
    ctx.font = this.font;
    const y = 10 + ctx.measureText(this.txt).actualBoundingBoxAscent;
    ctx.fillText(this.txt, 10, y);
  }
  get width() { return this.canvas.width; }
  get height() { return this.canvas.height; }
  get texture() { return this.canvas; }
}

// ---------- ASCII post-process filter ----------
class AsciiFilter {
  constructor(renderer, { fontSize = 12, fontFamily = "'Courier New', monospace", charset, invert = true } = {}) {
    this.renderer = renderer;
    this.domElement = document.createElement('div');
    this.domElement.style.position = 'absolute';
    this.domElement.style.inset = '0';
    this.pre = document.createElement('pre');
    this.domElement.appendChild(this.pre);
    this.canvas = document.createElement('canvas');
    this.context = this.canvas.getContext('2d');
    this.domElement.appendChild(this.canvas);
    this.deg = 0;
    this.invert = invert;
    this.fontSize = fontSize;
    this.fontFamily = fontFamily;
    this.charset = charset || " .'`^\",:;Il!i~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@@@@$";
    this.context.imageSmoothingEnabled = false;
    this.mouse = { x: 0, y: 0 };
    this.center = { x: 0, y: 0 };
    this.onMouseMove = this.onMouseMove.bind(this);
    document.addEventListener('mousemove', this.onMouseMove);
  }
  setSize(w, h) {
    this.width = w; this.height = h;
    this.renderer.setSize(w, h);
    this.reset();
    this.center = { x: w / 2, y: h / 2 };
    this.mouse = { x: this.center.x, y: this.center.y };
  }
  reset() {
    const ctx = this.context;
    ctx.font = `${this.fontSize}px ${this.fontFamily}`;
    const charW = ctx.measureText("A").width;
    this.cols = Math.floor(this.width / (this.fontSize * (charW / this.fontSize)));
    this.rows = Math.floor(this.height / this.fontSize);
    this.canvas.width = this.cols;
    this.canvas.height = this.rows;
    this.pre.style.fontFamily = this.fontFamily;
    this.pre.style.fontSize = this.fontSize + 'px';
  }
  render(scene, camera) {
    this.renderer.render(scene, camera);
    const w = this.canvas.width, h = this.canvas.height;
    if (!w || !h) return;
    this.context.clearRect(0, 0, w, h);
    this.context.drawImage(this.renderer.domElement, 0, 0, w, h);
    this.asciify(w, h);
    this.hue();
  }
  onMouseMove(e) {
    this.mouse = { x: e.clientX * (window.devicePixelRatio || 1), y: e.clientY * (window.devicePixelRatio || 1) };
  }
  get dx() { return this.mouse.x - this.center.x; }
  get dy() { return this.mouse.y - this.center.y; }
  hue() {
    const target = 180 * Math.atan2(this.dy, this.dx) / Math.PI;
    this.deg += (target - this.deg) * 0.075;
    this.domElement.style.filter = `hue-rotate(${this.deg.toFixed(1)}deg)`;
  }
  asciify(w, h) {
    const data = this.context.getImageData(0, 0, w, h).data;
    const colors = ['#6bb8db','#5aa6c9','#7cc9e8','#4caf50','#66bb6a','#81c784','#e0a458','#d4915a','#a855f7','#ec4899','#ef5350'];
    let out = '';
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = (x + y * w) * 4;
        const rr = data[i], gg = data[i+1], bb = data[i+2], aa = data[i+3];
        if (aa === 0) { out += ' '; continue; }
        let idx = Math.floor((1 - (0.3*rr + 0.6*gg + 0.1*bb) / 255) * (this.charset.length - 1));
        if (this.invert) idx = this.charset.length - idx - 1;
        const ch = this.charset[idx];
        if (ch === ' ') { out += ' '; continue; }
        const useColor = Math.random() < 0.28;
        const color = useColor ? colors[Math.floor(Math.random()*colors.length)] : '#f0f4f5';
        out += `<span style="color:${color}">${ch}</span>`;
      }
      out += '\n';
    }
    this.pre.innerHTML = out;
  }
}

// ---------- Scene setup ----------
class AsciiTextScene {
  constructor({ text, asciiFontSize = 16, textFontSize = 200, textColor = "#fdf9f3", planeBaseHeight = 8, enableWaves = true }, container, width, height) {
    this.textString = text;
    this.container = container;
    this.width = width; this.height = height;
    this.enableWaves = enableWaves;

    this.camera = new THREE.PerspectiveCamera(45, width / height, 1, 1000);
    this.camera.position.z = 30;
    this.scene = new THREE.Scene();
    this.mouse = { x: 0, y: 0 };
    this.onMouseMove = this.onMouseMove.bind(this);

    this.textCanvas = new TextCanvas(text, { fontSize: textFontSize, fontFamily: "Martian Mono, monospace", color: textColor });
    this.textCanvas.resize();
    this.textCanvas.render();
    this.texture = new THREE.CanvasTexture(this.textCanvas.texture);
    this.texture.minFilter = THREE.LinearFilter;

    const aspect = this.textCanvas.width / this.textCanvas.height;
    const h = planeBaseHeight;
    this.geometry = new THREE.PlaneGeometry(h * aspect, h, 36, 36);
    this.material = new THREE.ShaderMaterial({
      vertexShader, fragmentShader, transparent: true,
      uniforms: {
        uTime: { value: 0 },
        uTexture: { value: this.texture },
        uEnableWaves: { value: enableWaves ? 1 : 0 }
      }
    });
    this.mesh = new THREE.Mesh(this.geometry, this.material);
    this.scene.add(this.mesh);

    this.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
    this.renderer.setPixelRatio(1);
    this.renderer.setClearColor(0, 0);
    this.filter = new AsciiFilter(this.renderer, { fontFamily: "Martian Mono, monospace", fontSize: asciiFontSize, invert: true });
    this.container.appendChild(this.filter.domElement);
    this.setSize(width, height);
    this.container.addEventListener('mousemove', this.onMouseMove);
  }
  setSize(w, h) {
    this.width = w; this.height = h;
    this.camera.aspect = w / h;
    this.camera.updateProjectionMatrix();
    this.filter.setSize(w, h);
    this.center = { x: w / 2, y: h / 2 };
  }
  load() { this.animate(); }
  onMouseMove(e) {
    const rect = this.container.getBoundingClientRect();
    this.mouse = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  animate() {
    const loop = () => {
      this.animationFrameId = requestAnimationFrame(loop);
      this.render();
    };
    loop();
  }
  render() {
    const t = 0.001 * Date.now();
    this.textCanvas.render();
    this.texture.needsUpdate = true;
    this.material.uniforms.uTime.value = Math.sin(t);
    this.updateRotation();
    this.filter.render(this.scene, this.camera);
  }
  updateRotation() {
    const rx = -((this.mouse.y - 0) / (this.height - 0)) + 0.5;
    const ry = (this.mouse.x - 0) / (this.width - 0) - 0.5;
    this.mesh.rotation.x += (rx - this.mesh.rotation.x) * 0.05;
    this.mesh.rotation.y += (ry - this.mesh.rotation.y) * 0.05;
  }
}

// ---------- Boot ----------
const stage = document.getElementById('stage');
const scene = new AsciiTextScene({
  text: TEXT,
  asciiFontSize: 16,
  textFontSize: 200,
  textColor: "#fdf9f3",
  planeBaseHeight: 8,
  enableWaves: true
}, stage, window.innerWidth, window.innerHeight);
scene.load();

window.addEventListener('resize', () => {
  scene.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
